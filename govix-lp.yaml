version: "3.7"

services:
  app:
    image: ghcr.io/pedrogwe/govix-lp:latest
    networks:
      - mandatto
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"

        # Governanc LP — www.governanc.com.br
        - "traefik.http.routers.govix-lp.rule=Host(`www.governanc.com.br`) || Host(`governanc.com.br`)"
        - "traefik.http.routers.govix-lp.entrypoints=websecure"
        - "traefik.http.routers.govix-lp.tls=true"
        - "traefik.http.routers.govix-lp.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.govix-lp.loadbalancer.server.port=80"

        # Redirect governanc.com.br → www.governanc.com.br
        - "traefik.http.routers.govix-lp-redirect.rule=Host(`governanc.com.br`)"
        - "traefik.http.routers.govix-lp-redirect.entrypoints=websecure"
        - "traefik.http.routers.govix-lp-redirect.tls=true"
        - "traefik.http.routers.govix-lp-redirect.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.govix-lp-redirect.middlewares=govix-lp-www"
        - "traefik.http.middlewares.govix-lp-www.redirectregex.regex=^https://governanc\\.com\\.br/(.*)"
        - "traefik.http.middlewares.govix-lp-www.redirectregex.replacement=https://www.governanc.com.br/$${1}"
        - "traefik.http.middlewares.govix-lp-www.redirectregex.permanent=true"

networks:
  mandatto:
    external: true
    name: mandatto
